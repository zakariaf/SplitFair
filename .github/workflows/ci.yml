name: CI

on:
  push:
  pull_request:

jobs:
  money-math:
    name: BillCore money-math suite
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: swift test (the $97.20 reconciliation gate)
        run: swift test --package-path Packages/BillCore

  lint:
    name: SwiftFormat + SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: brew install swiftlint swiftformat
      - name: SwiftFormat (lint mode)
        run: swiftformat --lint .
      - name: SwiftLint (strict)
        run: swiftlint --strict
